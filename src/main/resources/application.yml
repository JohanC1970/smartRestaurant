# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000
  issuer: smartRestaurant

# Spring Configuration
spring:
  application:
    name: smartRestaurant

  datasource:
    url: jdbc:postgresql://localhost:5432/smart_restaurant
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

server:
  port: ${SERVER_PORT:8080}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200,http://localhost:3000}

social:
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
  facebook:
    app-id: ${FACEBOOK_APP_ID:}
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}

cloudinary:
  cloud_name: ${CLOUDINARY_NAME}
  api_key: ${CLOUDINARY_KEY}
  api_secret: ${CLOUDINARY_SECRET}

spring.servlet.multipart:
  enabled: true
  max-file-size: 10MB
  max-request-size: 10MB

app:
  init:
    admin:
      email: ${ADMIN_EMAIL}
      password: ${ADMIN_PASSWORD}

chatbot:
  api:
    key: ${CHATBOT_API_KEY:default_chatbot_key_12345}

wompi:
  api:
    key: ${WOMPI_API_KEY}
    public-key: ${WOMPI_PUBLIC_KEY}
    integrity-secret: ${WOMPI_INTEGRITY_SECRET}
    environment: ${WOMPI_ENVIRONMENT:test}
    url-test: https://staging.wompi.co/api
    url-production: https://production.wompi.co/api
