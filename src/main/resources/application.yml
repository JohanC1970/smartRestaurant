# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000  # 1 hora en milisegundos
  refresh-token-expiration: 604800000  # 7 días en milisegundos
  issuer: smartRestaurant

# Spring Configuration
spring:
  application:
    name: smartRestaurant

  # Database Configuration
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # JPA Configuration
  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Mail Configuration (SMTP)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:garciacamilo1970@gmail.com}
    password: ${MAIL_PASSWORD:lulf fxpj ancz ayie}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

# Server Configuration
server:
  port: ${SERVER_PORT:8080}

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200,http://localhost:3000}

# Social Login Configuration
social:
  google:
    client-id: ${GOOGLE_CLIENT_ID:512756127640-hm9hitju6rp7d749v8v9tiifqj19b3ko.apps.googleusercontent.com}
    client-secret: ${GOOGLE_CLIENT_SECRET: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}
  facebook:
    app-id: ${FACEBOOK_APP_ID:}
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}

# Cloudinary Configuration
cloudinary:
  cloud_name: ${CLOUDINARY_NAME}
  api_key: ${CLOUDINARY_KEY}
  api_secret: ${CLOUDINARY_SECRET}

# Multipart Configuration (para subida de imágenes)
spring.servlet.multipart:
  enabled: true
  max-file-size: 10MB
  max-request-size: 10MB

# Application Specific Configuration
app:
  init:
    admin:
      email: ${ADMIN_EMAIL:samuelandrescm@gmail.com}
      password: ${ADMIN_PASSWORD:Smart1234!}

# Chatbot Configuration
chatbot:
  api:
    key: ${CHATBOT_API_KEY:default_chatbot_key_12345}

# Wompi Payment Gateway Configuration
wompi:
  api:
    key: ${WOMPI_API_KEY}
    public-key: ${WOMPI_PUBLIC_KEY}
    integrity-secret: ${WOMPI_INTEGRITY_SECRET}
    environment: ${WOMPI_ENVIRONMENT:test}
    url-test: https://staging.wompi.co/api
    url-production: https://production.wompi.co/api
