# JWT Configuration
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  access-token-expiration: 3600000  # 1 hora en milisegundos
  refresh-token-expiration: 604800000  # 7 días en milisegundos
  issuer: smartRestaurant

# Spring Configuration
spring:
  application:
    name: smartRestaurant
  
  # Database Configuration
  datasource:
    url: ${DB_URL:jdbc:postgresql://ep-quiet-waterfall-adj825hn-pooler.c-2.us-east-1.aws.neon.tech/neondb?sslmode=require}
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD:default_password}
    driver-class-name: org.postgresql.Driver
  
  # JPA Configuration
  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update


    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  # SendGrid Configuration
  sendgrid:
    api-key: ${SENDGRID_API_KEY:default_sendgrid_key}
    from-email: ${MAIL_USERNAME:smartrestaurant15@gmail.com}

# Server Configuration
server:
  port: ${SERVER_PORT}
  #error:
    #include-message: always
    #include-binding-errors: always

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200,http://localhost:3000,https://smart-restaurant-front-web.vercel.app}

# Social Login Configuration
social:
  google:
    client-id: ${GOOGLE_CLIENT_ID:512756127640-hm9hitju6rp7d749v8v9tiifqj19b3ko.apps.googleusercontent.com}
    client-secret: ${GOOGLE_CLIENT_SECRET:default_google_secret}
  facebook:
    app-id: ${FACEBOOK_APP_ID:}
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}

# Cloudinary Configuration
cloudinary:

  cloud_name: ${CLOUDINARY_NAME}
  api_key: ${CLOUDINARY_KEY}
  api_secret: ${CLOUDINARY_SECRET}

# Multipart Configuration (para subida de imágenes)
spring.servlet.multipart:
  enabled: true
  max-file-size: 10MB
  max-request-size: 10MB
# Application Specific Configuration
app:
  init:
    admin:
      email: ${ADMIN_EMAIL:smartrestaurant15@gmail.com}
      password: ${ADMIN_PASSWORD:default_admin_password}

# Chatbot Configuration
chatbot:
  api:
    key: ${CHATBOT_API_KEY:default_chatbot_key_12345}

